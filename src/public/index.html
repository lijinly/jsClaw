<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jsClaw</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* WorkBuddy 风格配色 */
      --bg: #ffffff;
      --surface: #f5f6f8;
      --surface2: #ffffff;
      --surface3: #ffffff;
      --border: #e5e7eb;
      --border-light: #f0f0f0;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-light: #dbeafe;
      --text: #1f2937;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --text-dim: #d1d5db;
      --green: #10b981;
      --yellow: #f59e0b;
      --red: #ef4444;
      
      /* 尺寸 */
      --radius: 8px;
      --radius-lg: 12px;
      --sidebar-w: 64px;
      --list-w: 300px;
      --header-h: 56px;
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

    /* ── Layout ── */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Left Navigation (narrow, icon-based) ── */
    .nav {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 8px;
      flex-shrink: 0;
    }

    .logo {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .nav-item {
      width: 44px; height: 44px;
      border-radius: var(--radius);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      display: flex; flex-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--accent-light); color: var(--accent); }

    .nav-divider {
      width: 36px; height: 1px;
      background: var(--border);
      margin: 8px 0;
      flex-shrink: 0;
    }

    .user-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600;
      color: #fff;
      margin-top: auto;
      flex-shrink: 0;
    }

    /* ── List Panel (sessions or teams) ── */
    .list-panel {
      width: var(--list-w); min-width: var(--list-w);
      background: var(--surface2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0;
    }

    .list-header {
      height: var(--header-h);
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface2);
      flex-shrink: 0;
    }

    .list-title {
      font-size: 14px; font-weight: 600; color: var(--text);
    }

    .list-back {
      font-size: 13px; color: var(--accent);
      cursor: pointer; user-select: none;
      display: none; align-items: center; gap: 4px;
    }
    .list-back:hover { color: var(--accent-hover); }

    .list-actions { display: flex; gap: 8px; }

    .icon-btn {
      width: 32px; height: 32px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

    .list-body { flex: 1; overflow-y: auto; }
    .list-body::-webkit-scrollbar { width: 4px; }
    .list-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Session items */
    .sess-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .sess-item:hover { background: var(--surface); }
    .sess-item.active { background: var(--accent-light); border-left: 3px solid var(--accent); padding-left: 13px; }

    .sess-title {
      font-size: 13px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .sess-item.active .sess-title { color: var(--accent-hover); }

    .sess-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-muted);
    }

    .sess-preview {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1;
    }

    /* Team items */
    .team-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: all 0.15s;
    }
    .team-item:hover { background: var(--surface); }
    .team-item.selected { background: var(--accent-light); border-left: 3px solid var(--accent); padding-left: 13px; }

    .team-name {
      font-size: 14px; font-weight: 600; color: var(--text);
      margin-bottom: 4px;
    }
    .team-item.selected .team-name { color: var(--accent-hover); }

    .team-desc {
      font-size: 12px; color: var(--text-muted);
      line-height: 1.4;
    }

    .team-meta {
      display: flex; align-items: center; gap: 12px;
      margin-top: 8px;
      font-size: 11px; color: var(--text-dim);
    }

    .team-stat {
      display: flex; align-items: center; gap: 4px;
    }

    /* Empty state */
    .empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 48px 24px;
      color: var(--text-muted);
      text-align: center;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 13px; line-height: 1.6; }

    /* ── Main Chat Area ── */
    .main {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; min-width: 0;
    }

    .chat-header {
      height: var(--header-h);
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg);
      flex-shrink: 0;
    }

    .chat-title-group { display: flex; align-items: center; gap: 10px; }
    .chat-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .chat-mode-badge {
      font-size: 11px; padding: 2px 8px;
      border-radius: 10px;
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 500;
    }
    .chat-team-badge {
      font-size: 11px; padding: 2px 8px;
      border-radius: 10px;
      background: var(--surface);
      color: var(--text-secondary);
      font-weight: 500;
    }

    .status-indicator {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
    }
    .status-dot.thinking { background: var(--yellow); animation: pulse 1s infinite; }
    .status-dot.error { background: var(--red); }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Messages */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

    /* Welcome screen */
    .welcome {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 20px;
    }
    .welcome-icon {
      width: 80px; height: 80px;
      border-radius: var(--radius-lg);
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; color: var(--accent);
    }
    .welcome h2 { font-size: 24px; font-weight: 600; color: var(--text); }
    .welcome p { font-size: 14px; color: var(--text-secondary); max-width: 360px; text-align: center; line-height: 1.6; }
    .welcome-tips { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
    .welcome-tip {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--text-secondary);
    }
    .welcome-tip-icon {
      width: 24px; height: 24px;
      border-radius: var(--radius);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }

    /* Message bubbles */
    .msg {
      display: flex; gap: 12px;
      animation: msgIn 0.2s ease-out;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: var(--radius);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600;
    }
    .msg-avatar.user {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    .msg-avatar.agent {
      background: var(--accent);
      color: #fff;
    }

    .msg-content { flex: 1; min-width: 0; }
    .msg-role {
      font-size: 12px; font-weight: 600; color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .msg-text {
      font-size: 14px; line-height: 1.6; color: var(--text);
      white-space: pre-wrap;
    }

    /* Thinking block */
    .thinking {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-top: 8px;
      font-size: 13px; color: var(--text-secondary);
      line-height: 1.5;
    }
    .thinking-header {
      display: flex; align-items: center; gap: 8px;
      font-weight: 500; margin-bottom: 8px;
      color: var(--accent);
    }

    /* Tool call */
    .tool {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-top: 6px;
      font-size: 12px;
    }
    .tool-header {
      display: flex; align-items: center; gap: 8px;
      font-weight: 500; margin-bottom: 6px;
      color: var(--text);
    }
    .tool-name {
      background: var(--accent-light);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
    }
    .tool-result {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 10px;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      color: var(--text-secondary);
    }
    .tool-result::-webkit-scrollbar { width: 4px; }
    .tool-result::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Input area */
    .input-area {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .input-wrapper {
      display: flex; gap: 12px; align-items: flex-end;
    }

    .mode-select {
      display: flex; gap: 4px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 4px;
      border: 1px solid var(--border);
    }

    .mode-option {
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-option:hover { color: var(--text); }
    .mode-option.active { background: var(--bg); color: var(--accent); font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

    .input-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      transition: all 0.15s;
    }
    .input-box:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg);
    }
    .input-box::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 44px; height: 44px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { background: var(--text-dim); cursor: not-allowed; }

    /* Loading dots */
    .typing {
      display: flex; gap: 4px; padding: 8px 0;
    }
    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typing 1.4s infinite ease-in-out;
    }
    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    /* Utility */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Left Navigation -->
    <div class="nav">
      <div class="logo">JS</div>
      <button class="nav-item active" id="nav-chat" title="对话">💬</button>
      <button class="nav-item" id="nav-teams" title="团队">👥</button>
      <button class="nav-item" id="nav-agents" title="智能体">🤖</button>
      <button class="nav-item" id="nav-settings" title="设置">⚙️</button>
      <div class="nav-divider"></div>
      <div class="user-avatar">U</div>
    </div>

    <!-- List Panel -->
    <div class="list-panel" id="listPanel">
      <!-- Agent/Team mode header -->
      <div class="list-header">
        <div style="display: flex; align-items: center; gap: 8px;">
          <button class="icon-btn" id="modeAgent" style="padding: 6px;">🤖</button>
          <button class="icon-btn" id="modeTeam" style="padding: 6px;">👥</button>
        </div>
        <div class="list-actions">
          <button class="icon-btn" id="newBtn" title="新建对话">➕</button>
        </div>
      </div>

      <!-- Back button for team sessions -->
      <div class="list-header" id="sessionHeader" style="display: none;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <div class="list-back" id="backToTeams">← 返回团队</div>
        </div>
        <div class="list-title">会话历史</div>
        <div class="list-actions">
          <button class="icon-btn" id="newSessionBtn" title="新建对话">➕</button>
        </div>
      </div>

      <!-- Team list -->
      <div class="list-body" id="teamList">
        <div class="team-item" data-team="dev">
          <div class="team-name">开发组</div>
          <div class="team-desc">前端、后端、DevOps 相关任务</div>
          <div class="team-meta">
            <div class="team-stat">📋 <span>12 会话</span></div>
            <div class="team-stat">👥 <span>4 成员</span></div>
          </div>
        </div>
        <div class="team-item" data-team="research">
          <div class="team-name">研究组</div>
          <div class="team-desc">市场调研、竞品分析、行业研究</div>
          <div class="team-meta">
            <div class="team-stat">📋 <span>8 会话</span></div>
            <div class="team-stat">👥 <span>3 成员</span></div>
          </div>
        </div>
        <div class="team-item" data-team="general">
          <div class="team-name">综合组</div>
          <div class="team-desc">通用任务、咨询、文档处理</div>
          <div class="team-meta">
            <div class="team-stat">📋 <span>5 会话</span></div>
            <div class="team-stat">👥 <span>2 成员</span></div>
          </div>
        </div>
      </div>

      <!-- Session list -->
      <div class="list-body hidden" id="sessionList">
        <div class="empty">
          <div class="empty-icon">💬</div>
          <div class="empty-text">暂无会话<br />点击 + 创建新对话</div>
        </div>
      </div>
    </div>

    <!-- Main Chat Area -->
    <div class="main">
      <!-- Header -->
      <div class="chat-header" id="chatHeader">
        <div class="chat-title-group">
          <div class="chat-title" id="chatTitle">jsClaw</div>
          <span class="chat-mode-badge" id="modeBadge">Agent</span>
          <span class="chat-team-badge hidden" id="teamBadge">开发组</span>
        </div>
        <div class="status-indicator">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">就绪</span>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages" id="messages">
        <div class="welcome">
          <div class="welcome-icon">🚀</div>
          <h2>欢迎使用 jsClaw</h2>
          <p>强大的多智能体协作平台</p>
          <div class="welcome-tips">
            <div class="welcome-tip">
              <div class="welcome-tip-icon">🤖</div>
              <span>选择 Agent 模式进行单智能体对话</span>
            </div>
            <div class="welcome-tip">
              <div class="welcome-tip-icon">👥</div>
              <span>选择 Team 模式进行团队协作</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-wrapper">
          <div class="mode-select">
            <button class="mode-option active" data-mode="craft">Craft</button>
            <button class="mode-option" data-mode="plan">Plan</button>
            <button class="mode-option" data-mode="ask">Ask</button>
          </div>
          <textarea class="input-box" id="input" placeholder="输入消息..." rows="1"></textarea>
          <button class="send-btn" id="send">➤</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // State
    let state = {
      mode: 'agent', // 'agent' or 'team'
      currentTeam: null,
      currentSession: null,
      sessions: [],
      isThinking: false
    };

    // DOM Elements
    const $ = id => document.getElementById(id);
    const modeAgent = $('modeAgent');
    const modeTeam = $('modeTeam');
    const teamList = $('teamList');
    const sessionList = $('sessionList');
    const sessionHeader = $('sessionHeader');
    const backToTeams = $('backToTeams');
    const newBtn = $('newBtn');
    const newSessionBtn = $('newSessionBtn');
    const messages = $('messages');
    const input = $('input');
    const send = $('send');
    const statusDot = $('statusDot');
    const statusText = $('statusText');
    const chatTitle = $('chatTitle');
    const modeBadge = $('modeBadge');
    const teamBadge = $('teamBadge');
    const modeOptions = document.querySelectorAll('.mode-option');

    // Mode switch
    modeAgent.addEventListener('click', () => setMode('agent'));
    modeTeam.addEventListener('click', () => setMode('team'));

    function setMode(mode) {
      state.mode = mode;
      modeAgent.style.background = mode === 'agent' ? 'var(--accent-light)' : 'transparent';
      modeAgent.style.color = mode === 'agent' ? 'var(--accent)' : 'var(--text-secondary)';
      modeTeam.style.background = mode === 'team' ? 'var(--accent-light)' : 'transparent';
      modeTeam.style.color = mode === 'team' ? 'var(--accent)' : 'var(--text-secondary)';
      
      modeBadge.textContent = mode === 'agent' ? 'Agent' : 'Team';
      
      if (mode === 'team') {
        teamList.classList.remove('hidden');
        sessionList.classList.add('hidden');
        sessionHeader.style.display = 'none';
        document.querySelector('.list-header').style.display = 'flex';
        state.currentTeam = null;
        teamBadge.classList.add('hidden');
      } else {
        teamList.classList.add('hidden');
        sessionList.classList.remove('hidden');
        sessionHeader.style.display = 'none';
        document.querySelector('.list-header').style.display = 'flex';
        loadSessions();
      }
      
      chatTitle.textContent = mode === 'agent' ? 'jsClaw - Agent' : 'jsClaw - Team';
    }

    // Team selection
    teamList.addEventListener('click', (e) => {
      const item = e.target.closest('.team-item');
      if (!item) return;
      
      const teamId = item.dataset.team;
      selectTeam(teamId, item.querySelector('.team-name').textContent);
    });

    function selectTeam(teamId, teamName) {
      state.currentTeam = { id: teamId, name: teamName };
      
      // Highlight selected
      document.querySelectorAll('.team-item').forEach(el => el.classList.remove('selected'));
      teamList.querySelector(`[data-team="${teamId}"]`).classList.add('selected');
      
      // Show sessions
      teamList.classList.add('hidden');
      sessionList.classList.remove('hidden');
      sessionHeader.style.display = 'flex';
      document.querySelector('.list-header').style.display = 'none';
      
      // Update header
      teamBadge.textContent = teamName;
      teamBadge.classList.remove('hidden');
      chatTitle.textContent = `jsClaw - ${teamName}`;
      
      loadSessions(teamId);
    }

    // Back to teams
    backToTeams.addEventListener('click', () => {
      state.currentTeam = null;
      teamList.classList.remove('hidden');
      sessionList.classList.add('hidden');
      sessionHeader.style.display = 'none';
      document.querySelector('.list-header').style.display = 'flex';
      teamBadge.classList.add('hidden');
      chatTitle.textContent = 'jsClaw - Team';
    });

    // Load sessions
    async function loadSessions(teamId = null) {
      const filter = teamId ? `?mode=team&teamId=${teamId}` : '?mode=agent';
      const res = await fetch(`/api/sessions${filter}`);
      const { sessions } = await res.json();
      
      state.sessions = sessions;
      renderSessions(sessions);
    }

    function renderSessions(sessions) {
      if (sessions.length === 0) {
        sessionList.innerHTML = `
          <div class="empty">
            <div class="empty-icon">💬</div>
            <div class="empty-text">暂无会话<br />点击 + 创建新对话</div>
          </div>
        `;
        return;
      }
      
      sessionList.innerHTML = sessions.map(s => {
        const time = new Date(s.updatedAt).toLocaleDateString('zh-CN');
        return `
          <div class="sess-item ${s.id === state.currentSession?.id ? 'active' : ''}" data-id="${s.id}">
            <div class="sess-title">${s.title || '新对话'}</div>
            <div class="sess-meta">
              <span class="sess-preview">${s.preview || '暂无消息'}</span>
              <span>${time}</span>
            </div>
          </div>
        `;
      }).join('');
      
      // Click handlers
      sessionList.querySelectorAll('.sess-item').forEach(el => {
        el.addEventListener('click', () => loadSession(el.dataset.id));
      });
    }

    // Load session
    async function loadSession(sessionId) {
      const res = await fetch(`/api/sessions/${sessionId}`);
      const session = await res.json();
      
      state.currentSession = session;
      
      // Highlight
      sessionList.querySelectorAll('.sess-item').forEach(el => el.classList.remove('active'));
      sessionList.querySelector(`[data-id="${sessionId}"]`)?.classList.add('active');
      
      // Update header
      chatTitle.textContent = session.title || '新对话';
      
      // Render messages
      renderMessages(session.messages);
    }

    function renderMessages(msgs) {
      if (!msgs || msgs.length === 0) {
        messages.innerHTML = `
          <div class="welcome">
            <div class="welcome-icon">💬</div>
            <h2>开始对话</h2>
            <p>在下方输入消息开始新的对话</p>
          </div>
        `;
        return;
      }
      
      messages.innerHTML = msgs.map(m => `
        <div class="msg">
          <div class="msg-avatar ${m.role}">${m.role === 'user' ? 'U' : 'AI'}</div>
          <div class="msg-content">
            <div class="msg-role">${m.role === 'user' ? '你' : 'AI'}</div>
            <div class="msg-text">${escapeHtml(m.content)}</div>
          </div>
        </div>
      `).join('');
      
      messages.scrollTop = messages.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // New session
    newBtn.addEventListener('click', () => createSession());
    newSessionBtn.addEventListener('click', () => createSession());

    async function createSession() {
      const teamId = state.currentTeam?.id;
      const res = await fetch('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mode: state.mode,
          teamId: teamId
        })
      });
      const session = await res.json();
      
      state.currentSession = session;
      await loadSessions(teamId);
      await loadSession(session.id);
    }

    // Send message
    send.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || state.isThinking) return;
      
      input.value = '';
      input.style.height = 'auto';
      
      // Add user message
      if (!state.currentSession) {
        await createSession();
      }
      
      await fetch(`/api/sessions/${state.currentSession.id}/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ role: 'user', content: text })
      });
      
      await loadSession(state.currentSession.id);
      
      // Show typing
      setStatus('thinking', 'AI 思考中...');
      
      // Simulate response
      setTimeout(async () => {
        const res = await fetch(`/api/sessions/${state.currentSession.id}/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            role: 'assistant', 
            content: `收到: ${text}\n\n这是一个模拟响应。实际使用时需要连接到 AI 服务。` 
          })
        });
        
        await loadSession(state.currentSession.id);
        await loadSessions(state.currentTeam?.id);
        setStatus('ready', '就绪');
      }, 1000);
    }

    function setStatus(status, text) {
      statusDot.className = `status-dot ${status === 'thinking' ? 'thinking' : status === 'error' ? 'error' : ''}`;
      statusText.textContent = text;
    }

    // Mode options
    modeOptions.forEach(opt => {
      opt.addEventListener('click', () => {
        modeOptions.forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
      });
    });

    // Auto-resize textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    // Init
    setMode('agent');
  </script>
</body>
</html>
