<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jsClaw</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22253a;
      --border: #2e3148;
      --accent: #6c63ff;
      --accent-dim: #3d3880;
      --text: #e8eaf0;
      --text-muted: #7b80a0;
      --text-dim: #4a4f72;
      --user-bg: #1e2a4a;
      --agent-bg: #1a1d27;
      --thinking-bg: #12151f;
      --tool-bg: #0e1a1a;
      --tool-border: #1a3535;
      --green: #4ade80;
      --yellow: #facc15;
      --red: #f87171;
      --radius: 14px;
      --radius-sm: 8px;
    }

    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* ── Layout ── */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px; min-width: 260px; background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 20px 16px; gap: 24px;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo-icon {
      width: 36px; height: 36px; background: var(--accent);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px;
    }

    /* Mode selector */
    .mode-tabs { display: flex; gap: 6px; }
    .mode-tab {
      flex: 1; padding: 8px 0; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .15s;
    }
    .mode-tab.active {
      background: var(--accent); border-color: var(--accent);
      color: #fff;
    }
    .mode-tab:hover:not(.active) { border-color: var(--accent-dim); color: var(--text); }

    /* Team list */
    .team-list { display: flex; flex-direction: column; gap: 6px; }
    .team-item {
      padding: 10px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); cursor: pointer;
      transition: all .15s; background: transparent;
      text-align: left;
    }
    .team-item:hover { border-color: var(--accent-dim); background: var(--surface2); }
    .team-item.selected { border-color: var(--accent); background: var(--accent-dim); }
    .team-item-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .team-item-desc { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }
    .team-item-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; color: var(--text-dim); margin-top: 5px;
    }

    #team-section { display: none; }
    #team-section.visible { display: block; }

    /* Sidebar bottom */
    .sidebar-bottom { margin-top: auto; }
    .clear-btn {
      width: 100%; padding: 9px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-size: 13px; cursor: pointer;
      transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Main chat area ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    .header {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface);
    }
    .header-title { font-size: 15px; font-weight: 600; }
    .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 6px var(--green);
    }
    .status-dot.thinking { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: pulse 1s infinite; }
    .status-dot.error { background: var(--red); box-shadow: 0 0 6px var(--red); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Messages */
    .messages {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Welcome screen */
    .welcome {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 16px; color: var(--text-muted);
    }
    .welcome-icon { font-size: 48px; }
    .welcome h2 { font-size: 22px; color: var(--text); }
    .welcome p { font-size: 14px; text-align: center; max-width: 380px; line-height: 1.6; }
    .welcome-pills { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
    .welcome-pill {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      font-size: 12px; color: var(--text-muted); cursor: pointer; transition: all .15s;
    }
    .welcome-pill:hover { border-color: var(--accent); color: var(--text); }

    /* Message bubble */
    .msg { display: flex; gap: 12px; max-width: 820px; width: 100%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px; min-width: 34px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700;
    }
    .avatar.user-avatar { background: var(--user-bg); color: var(--accent); }
    .avatar.bot-avatar { background: var(--accent); color: #fff; }

    .bubble-wrap { display: flex; flex-direction: column; gap: 8px; min-width: 0; }

    .bubble {
      padding: 12px 16px; border-radius: var(--radius); line-height: 1.7;
      font-size: 14px; white-space: pre-wrap; word-break: break-word;
    }
    .bubble.user { background: var(--user-bg); border: 1px solid #2a3a5e; color: var(--text); border-top-right-radius: 4px; }
    .bubble.assistant { background: var(--agent-bg); border: 1px solid var(--border); color: var(--text); border-top-left-radius: 4px; }

    /* Executor tag */
    .executor-tag {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text-dim);
      padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border);
      align-self: flex-start;
    }

    /* Thinking block */
    .thinking-block {
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .thinking-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; background: var(--thinking-bg);
      cursor: pointer; user-select: none; font-size: 12px; color: var(--text-muted);
    }
    .thinking-header:hover { color: var(--text); }
    .thinking-chevron { transition: transform .2s; font-style: normal; }
    .thinking-body {
      padding: 12px 14px; background: var(--thinking-bg);
      font-size: 12px; color: var(--text-muted); line-height: 1.7;
      white-space: pre-wrap; word-break: break-word;
      border-top: 1px solid var(--border);
      display: none;
    }
    .thinking-body.open { display: block; }

    /* Tool call block */
    .tool-calls { display: flex; flex-direction: column; gap: 6px; }
    .tool-call {
      background: var(--tool-bg); border: 1px solid var(--tool-border);
      border-radius: var(--radius-sm); overflow: hidden;
    }
    .tool-call-header {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; font-size: 12px; cursor: pointer;
    }
    .tool-call-header:hover { background: rgba(255,255,255,.03); }
    .tool-name { color: var(--green); font-family: monospace; font-weight: 600; }
    .tool-call-args {
      padding: 8px 12px; font-family: monospace; font-size: 11px;
      color: var(--text-muted); background: #080e0e; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
      border-top: 1px solid var(--tool-border); display: none;
    }
    .tool-call-args.open { display: block; }

    /* Status/typing indicator */
    .status-msg {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-muted);
    }
    .dots span {
      display: inline-block; width: 4px; height: 4px; border-radius: 50%;
      background: var(--text-dim); animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

    /* ── Input area ── */
    .input-area {
      padding: 16px 24px; border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .input-wrap {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
      transition: border-color .15s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    #msg-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 14px; resize: none;
      max-height: 160px; line-height: 1.6; font-family: inherit;
    }
    #msg-input::placeholder { color: var(--text-dim); }
    .send-btn {
      width: 36px; height: 36px; min-width: 36px; border-radius: 10px;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; color: #fff; font-size: 16px;
    }
    .send-btn:hover { background: #7c73ff; transform: scale(1.05); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
    .input-hint { font-size: 11px; color: var(--text-dim); margin-top: 8px; text-align: right; }
  </style>
</head>
<body>
<div class="app">
  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🦀</div>
      jsClaw
    </div>

    <div>
      <div class="section-label">模式</div>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="agent">Agent</button>
        <button class="mode-tab" data-mode="team">Team</button>
      </div>
    </div>

    <div id="team-section">
      <div class="section-label">选择团队</div>
      <div class="team-list" id="team-list">
        <div style="font-size:12px;color:var(--text-dim)">加载中...</div>
      </div>
    </div>

    <div class="sidebar-bottom">
      <button class="clear-btn" id="clear-btn">
        <span>🗑</span> 清除对话
      </button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <header class="header">
      <div>
        <div class="header-title" id="header-title">Agent 模式</div>
        <div class="header-sub" id="header-sub">单个智能助手，处理通用任务</div>
      </div>
      <div class="status-dot" id="status-dot"></div>
    </header>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🦀</div>
        <h2>jsClaw Agent</h2>
        <p>基于双层架构的 AI Agent 框架。切换左侧模式，选择 Agent 或 Team 协作处理任务。</p>
        <div class="welcome-pills">
          <div class="welcome-pill" onclick="fillInput('帮我搜索一下 jsClaw 项目的相关信息')">🔍 搜索信息</div>
          <div class="welcome-pill" onclick="fillInput('列出当前目录下的所有文件')">📁 列出文件</div>
          <div class="welcome-pill" onclick="fillInput('你有哪些可用的技能？')">🛠 查看技能</div>
          <div class="welcome-pill" onclick="fillInput('帮我写一段 JavaScript 代码，实现冒泡排序')">💻 写代码</div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="msg-input" rows="1" placeholder="输入消息，Shift+Enter 换行，Enter 发送..."></textarea>
        <button class="send-btn" id="send-btn" title="发送">➤</button>
      </div>
      <div class="input-hint">Shift+Enter 换行 · Enter 发送</div>
    </div>
  </main>
</div>

<script>
  // ── State ──────────────────────────────────────
  let currentMode = 'agent';
  let currentTeamId = null;
  let isLoading = false;
  const sessionId = 'web-' + Date.now();

  // ── DOM refs ───────────────────────────────────
  const messagesEl = document.getElementById('messages');
  const welcomeEl = document.getElementById('welcome');
  const input = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const statusDot = document.getElementById('status-dot');
  const headerTitle = document.getElementById('header-title');
  const headerSub = document.getElementById('header-sub');
  const teamSection = document.getElementById('team-section');
  const teamList = document.getElementById('team-list');

  // ── Load teams ─────────────────────────────────
  async function loadTeams() {
    try {
      const res = await fetch('/api/teams');
      const { teams } = await res.json();
      teamList.innerHTML = '';
      teams.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'team-item';
        btn.dataset.id = t.id;
        btn.innerHTML = `
          <div class="team-item-name">${t.name}</div>
          <div class="team-item-desc">${t.description || ''}</div>
          <div class="team-item-badge">👥 ${t.memberCount} members</div>
        `;
        btn.onclick = () => selectTeam(t.id, t.name, t.description, btn);
        teamList.appendChild(btn);
      });
    } catch (e) {
      teamList.innerHTML = '<div style="font-size:12px;color:var(--red)">加载失败</div>';
    }
  }

  function selectTeam(id, name, desc, el) {
    document.querySelectorAll('.team-item').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    currentTeamId = id;
    headerTitle.textContent = `Team · ${name}`;
    headerSub.textContent = desc || '';
  }

  // ── Mode tabs ──────────────────────────────────
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentMode = tab.dataset.mode;
      if (currentMode === 'team') {
        teamSection.classList.add('visible');
        headerTitle.textContent = '请选择团队';
        headerSub.textContent = '从左侧选择一个 Team';
      } else {
        teamSection.classList.remove('visible');
        currentTeamId = null;
        headerTitle.textContent = 'Agent 模式';
        headerSub.textContent = '单个智能助手，处理通用任务';
      }
    };
  });

  // ── Clear ──────────────────────────────────────
  document.getElementById('clear-btn').onclick = async () => {
    await fetch('/api/clear', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ sessionId }) });
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    welcomeEl.style.display = 'flex';
  };

  // ── Input auto-resize ──────────────────────────
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.onclick = sendMessage;

  function fillInput(text) {
    input.value = text;
    input.dispatchEvent(new Event('input'));
    input.focus();
  }

  // ── Helpers ────────────────────────────────────
  function setStatus(state) {
    statusDot.className = 'status-dot' + (state ? ` ${state}` : '');
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Render user message ────────────────────────
  function appendUserMessage(text) {
    welcomeEl.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `
      <div class="avatar user-avatar">U</div>
      <div class="bubble-wrap">
        <div class="bubble user">${escapeHtml(text)}</div>
      </div>
    `;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  // ── Render assistant message (streaming) ──────
  function createAssistantMessage() {
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = `
      <div class="avatar bot-avatar">🦀</div>
      <div class="bubble-wrap" id="bubble-wrap-current">
        <div class="status-msg">
          <div class="dots"><span></span><span></span><span></span></div>
          <span id="status-text">思考中...</span>
        </div>
      </div>
    `;
    messagesEl.appendChild(div);
    scrollToBottom();
    return div.querySelector('#bubble-wrap-current');
  }

  function setStatusText(wrap, text) {
    const el = wrap.querySelector('#status-text');
    if (el) el.textContent = text;
  }

  function renderThinking(wrap, text) {
    // Remove status indicator
    const statusEl = wrap.querySelector('.status-msg');

    const block = document.createElement('div');
    block.className = 'thinking-block';
    const id = 'thinking-' + Date.now();
    block.innerHTML = `
      <div class="thinking-header" onclick="toggleBlock('${id}')">
        <span>💭</span>
        <span>思考过程</span>
        <span class="thinking-chevron" id="chevron-${id}">▶</span>
      </div>
      <div class="thinking-body" id="${id}">${escapeHtml(text)}</div>
    `;
    if (statusEl) wrap.insertBefore(block, statusEl);
    else wrap.appendChild(block);
    scrollToBottom();
  }

  function renderToolCall(wrap, name, args) {
    let toolsContainer = wrap.querySelector('.tool-calls');
    if (!toolsContainer) {
      toolsContainer = document.createElement('div');
      toolsContainer.className = 'tool-calls';
      const statusEl = wrap.querySelector('.status-msg');
      if (statusEl) wrap.insertBefore(toolsContainer, statusEl);
      else wrap.appendChild(toolsContainer);
    }

    const id = 'tool-' + Date.now() + Math.random();
    let argsFormatted = args;
    try {
      argsFormatted = JSON.stringify(JSON.parse(args), null, 2);
    } catch {}

    const div = document.createElement('div');
    div.className = 'tool-call';
    div.innerHTML = `
      <div class="tool-call-header" onclick="toggleBlock('${id}')">
        <span>⚙️</span>
        <span class="tool-name">${escapeHtml(name)}</span>
        <span style="color:var(--text-dim);font-size:11px;margin-left:auto">点击展开参数</span>
      </div>
      <div class="tool-call-args" id="${id}">${escapeHtml(argsFormatted)}</div>
    `;
    toolsContainer.appendChild(div);
    scrollToBottom();
  }

  function renderResult(wrap, text, executor) {
    const statusEl = wrap.querySelector('.status-msg');
    if (statusEl) statusEl.remove();

    const bubble = document.createElement('div');
    bubble.className = 'bubble assistant';
    bubble.textContent = text;
    wrap.appendChild(bubble);

    if (executor) {
      const tag = document.createElement('div');
      tag.className = 'executor-tag';
      tag.innerHTML = `<span>⚡</span> ${escapeHtml(executor)}`;
      wrap.appendChild(tag);
    }
    scrollToBottom();
  }

  function renderError(wrap, text) {
    const statusEl = wrap.querySelector('.status-msg');
    if (statusEl) statusEl.remove();
    const div = document.createElement('div');
    div.className = 'bubble assistant';
    div.style.borderColor = 'var(--red)';
    div.style.color = 'var(--red)';
    div.textContent = '⚠️ ' + text;
    wrap.appendChild(div);
    scrollToBottom();
  }

  window.toggleBlock = (id) => {
    const el = document.getElementById(id);
    el.classList.toggle('open');
    const chevron = document.getElementById('chevron-' + id);
    if (chevron) chevron.textContent = el.classList.contains('open') ? '▼' : '▶';
  };

  // ── Send message ───────────────────────────────
  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;

    if (currentMode === 'team' && !currentTeamId) {
      alert('请先在左侧选择一个 Team');
      return;
    }

    isLoading = true;
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    setStatus('thinking');

    appendUserMessage(text);
    const wrap = createAssistantMessage();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          mode: currentMode,
          teamId: currentTeamId,
          sessionId,
        }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop();

        let event = null;
        for (const line of lines) {
          if (line.startsWith('event: ')) {
            event = line.slice(7).trim();
          } else if (line.startsWith('data: ') && event) {
            try {
              const data = JSON.parse(line.slice(6));
              handleSSE(event, data, wrap);
            } catch {}
            event = null;
          }
        }
      }
    } catch (e) {
      renderError(wrap, e.message || '连接失败');
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      setStatus('');
    }
  }

  function handleSSE(event, data, wrap) {
    switch (event) {
      case 'status':
        setStatusText(wrap, data.text);
        break;
      case 'thinking':
        renderThinking(wrap, data.text);
        break;
      case 'tool_call':
        renderToolCall(wrap, data.name, data.args);
        break;
      case 'result':
        renderResult(wrap, data.text, data.executor);
        break;
      case 'error':
        renderError(wrap, data.text);
        break;
    }
  }

  // ── Init ───────────────────────────────────────
  loadTeams();
